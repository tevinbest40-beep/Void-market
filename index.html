<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Void Market - eFootball Accounts</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>VOID MARKET</h1>
    <p>Buy & Sell eFootball Accounts Instantly</p>
  </header>

  <section class="form">
    <h2>Post Your Account</h2>

    <input type="text" id="title" placeholder="Account Title" />
    <input type="number" id="price" placeholder="Price (KSH)" />
    <input type="text" id="contact" placeholder="WhatsApp Number" />
    <input type="text" id="image" placeholder="Image URL (for now)" />

    <button onclick="addPost()">Post Account</button>
  </section>

  <section id="posts"></section>

  <script src="script.js"></script>
</body>
</html>
